find_replace:
  - find_value: '\#\s*META\s+"default_lakehouse":\s*"([0-9a-fA-F-]{36})"'
    replace_value:
      _ALL_: "$ENV:FABRIC_TEST_LAKEHOUSE_ID"
    is_regex: "true"
    item_type: "Notebook"
    item_name: "SeedFixtures"
    file_path: "**/notebook-content.py"
  - find_value: '\#\s*META\s+"default_lakehouse_workspace_id":\s*"([0-9a-fA-F-]{36})"'
    replace_value:
      _ALL_: "$workspace.$id"
    is_regex: "true"
    item_type: "Notebook"
    item_name: "SeedFixtures"
    file_path: "**/notebook-content.py"
  - find_value: 'lakehouse_id\s*=\s*"([0-9a-fA-F-]{36})"'
    replace_value:
      _ALL_: "$ENV:FABRIC_TEST_LAKEHOUSE_ID"
    is_regex: "true"
    item_type: "Notebook"
    item_name: "SeedFixtures"
    file_path: "**/notebook-content.py"
  - find_value: 'workspace_id\s*=\s*"([0-9a-fA-F-]{36})"'
    replace_value:
      _ALL_: "$workspace.$id"
    is_regex: "true"
    item_type: "Notebook"
    item_name: "SeedFixtures"
    file_path: "**/notebook-content.py"
